# AI 实验室人才采集清单
# 新增实验室只需加一条：最少 name + domain；hints 全可选（降低 agent 探索成本）
# agent 从 domain 出发自主探索入口，不依赖硬编码 URL

labs:
- name: Stanford AI Lab (SAIL)
  domain: https://sail.stanford.edu
  hints:
    known_sublabs:
    - NLP Group
    - SNAP
    - Ermon Lab
    expected_roles:
    - Faculty
    - PhD Students
    - Postdocs
    - Staff
    - Alumni
    notes: Stanford AI Lab main portal. | CV、NLP、机器人、医疗AI | 创业密度极高，PhD/Postdoc流动性大
    known_people_urls:
    - /people
- name: Berkeley AI Research (BAIR)
  domain: https://bair.berkeley.edu
  hints:
    known_people_urls:
    - /people/faculty
    - /people/staff
    - /people/students
    - /people
    role_filter_selector: div[role='button']
    letter_filter_selector: a.cursor-pointer.no-underline
    expected_roles:
    - Faculty
    - Staff
    - PhD
    - Postdoc
    - Masters
    - Undergraduate
    - Alumni
    - Visiting Scholar
    - Visiting Researcher
    notes: Next.js app; role filters are MUI Chips (div[role=button]) not <button>. Students and Alumni share /people/students
      page; click 'All' role filter to include Alumni. | RL、机器人、自动驾驶、LLM | 有完整的Students/Postdocs列表，RL人才库
- name: MIT CSAIL
  domain: https://csail.mit.edu
  hints:
    known_people_urls:
    - /people
    - /research
    expected_roles:
    - Faculty
    - Professor
    - Graduate Student
    - PhD Student
    - Postdoc
    - Alumni
    notes: Drupal-based site with dynamic /people page. Server-side rendered detail pages have consistent field classes. |
      CV、机器人、计算生物学、系统 | 按研究组细分，PI页面链接到个人主页
- name: CMU Machine Learning Dept
  domain: https://ml.cmu.edu
  hints:
    known_people_urls:
    - /people
    notes: ML理论、统计学习 | 全球首个ML独立系，Faculty/Students/Staff全公开 | 列表数据直出JSON索引 peopleindexes/<slug>-index.v1.json，email用cs.cmu.edu名录API，见lab-specific-patterns.md CMU节
